name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: miniapp/package-lock.json

      - name: Build miniapp
        run: |
          cd miniapp
          npm ci
          npm run build

      - name: Set up SSH key
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          # 1. Pull latest code & install Python deps
          $SSH "$DEPLOY_USER@$DEPLOY_HOST" '
            set -e
            cd /home/ubuntu/barberbot
            git pull origin main
            ./venv/bin/pip install -q -r requirements.txt
            mkdir -p miniapp/dist
          '

          # 2. Copy freshly built miniapp dist
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            miniapp/dist/ \
            "$DEPLOY_USER@$DEPLOY_HOST:/home/ubuntu/barberbot/miniapp/dist/"

          # 3. Restart services
          $SSH "$DEPLOY_USER@$DEPLOY_HOST" '
            sudo systemctl restart barberbot
            sudo systemctl restart barberapi || true
            echo "Deploy complete"
          '
